<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            width: min(420px, calc(100% - 32px));
            text-align: center;
        }
        .card h1 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 28px;
        }
        .card p {
            line-height: 1.6;
            margin: 16px 0;
            color: #4a5568;
        }
        .highlight {
            display: inline-block;
            margin-top: 12px;
            font-weight: 600;
            color: #2d3748;
        }
        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .button:hover {
            background: #5563d5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Email Sent!</h1>
        <p>We have sent a welcome email to:</p>
        <p class="highlight">{{ email }}</p>
        <p>Please check your inbox and follow any instructions provided there.</p>
        <a class="button" href="/dashboard">Go to Dashboard</a>
    </div>
</body>
</html>
