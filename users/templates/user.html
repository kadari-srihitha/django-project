<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
    }
    .container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    h1 {
        color: white;
        text-align: center;
        margin-bottom: 20px;
    }
    form {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        width: 320px;
    }
    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 16px;
    }
    button {
        width: 100%;
        padding: 12px;
        background-color: #9a9a9a;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
    }
    button:hover {
        background-color: #b07a5f;
    }
    a {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #8d99a6;
        text-decoration: none;
        font-size: 14px;
    }
    a:hover {
        text-decoration: underline;
    }
    footer {
        text-align: center;
        padding: 10px;
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 12px;
    }
</style>
<div class="container">
    <div>
        <h1>Signup</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Enter your username" required>
            <input type="email" name="email" placeholder="Enter your email" required>
            <input type="password" name="password" placeholder="Enter your password" required>
            <button type="submit">Signup</button>
        </form>

        <a href="{% url 'login' %}">Already have an account? Login here</a>
    </div>
</div>
<footer>
    © 2023 Medha HMS. All rights reserved.
</footer>
