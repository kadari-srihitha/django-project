<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Doctor - Medha Hospital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #c0392b;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .message {
            margin-bottom: 25px;
            color: #333;
            line-height: 1.6;
            font-size: 1rem;
        }

        .doctor-details {
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .doctor-details strong {
            display: inline-block;
            width: 120px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button[type="submit"],
        .btn-cancel {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            color: white;
        }

        button[type="submit"] {
            background: #e74c3c;
        }

        button[type="submit"]:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #95a5a6;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Confirm Delete</h1>
        </div>

        <div class="content">
            <p class="message">Are you sure you want to delete this doctor? This action cannot be undone.</p>

            <div class="doctor-details">
                <p><strong>Name:</strong> {{ doctor.name }}</p>
                <p><strong>Specialization:</strong> {{ doctor.specialization }}</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="button-group">
                    <button type="submit">Yes, Delete</button>
                    <a href="{% url 'doctor_list' %}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
