<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            color: #0f172a;
        }

        .page-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 36px 34px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.55);
        }

        .hero {
            margin-bottom: 28px;
        }

        .hero .phone {
            margin: 0 0 12px;
            color: #2563eb;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 2.4rem;
            letter-spacing: -0.03em;
        }

        .hero p {
            margin: 0;
            color: #475569;
            font-size: 1rem;
            line-height: 1.7;
        }

        form {
            display: grid;
            gap: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            background: #f8fafc;
            color: #0f172a;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 5px rgba(56, 189, 248, 0.15);
            transform: translateY(-1px);
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(90deg, #2563eb 0%, #06b6d4 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(37, 99, 235, 0.22);
        }

        .note {
            margin-top: 4px;
            color: #64748b;
            font-size: 0.92rem;
        }

        @media (max-width: 640px) {
            .container {
                padding: 28px 20px;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="container">
            <div class="hero">
                <p class="phone">Call us now: <strong>9121878756</strong></p>
                <h1>Contact Us</h1>
                <p>Have a question or would like to share feedback? Send us a message and we will reply as soon as possible.</p>
            </div>
            <form action="/contact/" method="post">
                {% csrf_token %}
                <div>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your full name">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit">Send Message</button>
                <p class="note">We respect your privacy and will only use this information to respond to your inquiry.</p>
            </form>
        </section>
    </div>
</body>
</html>
