<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Appointment - Medha Hospital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        input[type="text"],
        input[type="datetime-local"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button[type="submit"],
        .btn-cancel {
            flex: 1;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            color: white;
        }

        button[type="submit"] {
            background: #27ae60;
        }

        button[type="submit"]:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #95a5a6;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Edit Appointment</h1>
        </div>

        <div class="content">
            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="patient">Patient</label>
                    <select id="patient" name="patient" required>
                        {% for p in patients %}
                        <option value="{{ p.id }}" {% if appointment.patient.id == p.id %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="doctor">Doctor</label>
                    <select id="doctor" name="doctor" required>
                        {% for d in doctors %}
                        <option value="{{ d.id }}" {% if appointment.doctor.id == d.id %}selected{% endif %}>{{ d }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="appointment_time">Appointment Time</label>
                    <input id="appointment_time" type="datetime-local" name="appointment_time" value="{{ appointment.appointment_time|date:'Y-m-d\TH:i' }}" required>
                </div>

                <div class="form-group">
                    <label for="appointment_status">Status</label>
                    <input id="appointment_status" type="text" name="appointment_status" value="{{ appointment.appointment_status }}" required>
                </div>

                <div class="button-group">
                    <button type="submit">Save Changes</button>
                    <a href="{% url 'appointment_list' %}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
